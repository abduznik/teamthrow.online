  </g>
  <path d="M540 470 q60 -40 120 0 v205 h-120 Z" fill="#150b1c" opacity="0.6"/>
  <rect width="1200" height="675" fill="url(#pFade)"/>
  <text x="60" y="600" font-family="Arial Black, Impact, sans-serif" font-size="92" fill="#ffffff" letter-spacing="6">PARIS</text>
  <text x="64" y="640" font-family="Arial, sans-serif" font-size="26" fill="#f2b35e" letter-spacing="8">ASSAULT · 2CP · FRANCE</text>
