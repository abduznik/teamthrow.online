<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Temple of Anubis">
  <defs>
    <linearGradient id="aSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a4a1f"/>
      <stop offset="0.45" stop-color="#c8853a"/>
      <stop offset="1" stop-color="#f0c879"/>
    </linearGradient>
    <linearGradient id="aFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0d0d0d" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#aSky)"/>
  <circle cx="600" cy="210" r="100" fill="#fff1c4" opacity="0.9"/>
  <!-- pyramids -->
  <g fill="#7a4f23">
    <path d="M120 470 L320 470 L220 280 Z"/>
    <path d="M880 470 L1140 470 L1010 250 Z"/>
  </g>
  <g fill="#8c5d2b">
    <path d="M220 280 L320 470 L260 470 Z" opacity="0.6"/>
    <path d="M1010 250 L1140 470 L1050 470 Z" opacity="0.6"/>
  </g>
  <!-- temple -->
  <g fill="#3a2410">
    <rect x="0" y="470" width="1200" height="205"/>
    <rect x="470" y="360" width="260" height="110"/>
    <rect x="450" y="340" width="300" height="24"/>
    <rect x="490" y="380" width="24" height="90"/>
    <rect x="588" y="380" width="24" height="90"/>
    <rect x="686" y="380" width="24" height="90"/>
  </g>
  <!-- jackal statue hint -->
  <g fill="#2a1a0a">
    <rect x="410" y="380" width="22" height="90"/>
    <path d="M410 380 l11 -28 l11 28 Z"/>
    <rect x="768" y="380" width="22" height="90"/>
    <path d="M768 380 l11 -28 l11 28 Z"/>
  </g>
  <rect width="1200" height="675" fill="url(#aFade)"/>
  <text x="60" y="595" font-family="Arial Black, Impact, sans-serif" font-size="64" fill="#ffffff" letter-spacing="3">TEMPLE OF ANUBIS</text>
  <text x="64" y="638" font-family="Arial, sans-serif" font-size="25" fill="#f0c879" letter-spacing="6">ASSAULT · 2CP · EGYPT</text>
</svg>
