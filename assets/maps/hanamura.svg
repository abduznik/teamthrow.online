<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Hanamura">
  <defs>
    <linearGradient id="hSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a0d1c"/>
      <stop offset="0.5" stop-color="#7a2540"/>
      <stop offset="1" stop-color="#e89bb0"/>
    </linearGradient>
    <linearGradient id="hFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0d0d0d" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#hSky)"/>
  <circle cx="930" cy="170" r="80" fill="#ffd9e4" opacity="0.85"/>
  <!-- castle -->
  <g fill="#1a0710">
    <rect x="0" y="470" width="1200" height="205"/>
    <rect x="500" y="330" width="200" height="140"/>
    <path d="M480 330 L600 270 L720 330 Z"/>
    <path d="M500 250 L600 200 L700 250 L680 280 L520 280 Z"/>
    <rect x="560" y="220" width="80" height="40"/>
  </g>
  <!-- torii gate -->
  <g fill="#b5253a">
    <rect x="180" y="350" width="20" height="120"/>
    <rect x="300" y="350" width="20" height="120"/>
    <rect x="160" y="340" width="180" height="16"/>
    <rect x="170" y="370" width="160" height="12"/>
  </g>
  <!-- cherry blossom branch -->
  <g fill="#f8b6cd">
    <circle cx="1040" cy="320" r="10"/><circle cx="1070" cy="300" r="9"/><circle cx="1090" cy="340" r="11"/>
    <circle cx="1110" cy="310" r="8"/><circle cx="1060" cy="350" r="9"/><circle cx="1020" cy="350" r="8"/>
  </g>
  <path d="M1130 280 Q1060 320 1010 370" stroke="#3a1018" stroke-width="6" fill="none"/>
  <rect width="1200" height="675" fill="url(#hFade)"/>
  <text x="60" y="600" font-family="Arial Black, Impact, sans-serif" font-size="84" fill="#ffffff" letter-spacing="5">HANAMURA</text>
  <text x="64" y="640" font-family="Arial, sans-serif" font-size="26" fill="#f8b6cd" letter-spacing="8">ASSAULT · 2CP · JAPAN</text>
</svg>
