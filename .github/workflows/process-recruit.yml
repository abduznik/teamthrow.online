name: Process New Recruit

on:
  repository_dispatch:
    types: [new_recruit]

jobs:
  add-recruit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RECRUIT_TOKEN }}

      - name: Debug payload
        run: |
          echo "=== DEBUG: RAW CLIENT PAYLOAD ==="
          echo '${{ toJson(github.event.client_payload) }}'
          echo "=== DEBUG: FIELD BY FIELD ==="
          echo "battletag: ${{ github.event.client_payload.battletag }}"
          echo "role: ${{ github.event.client_payload.role }}"
          echo "hero: ${{ github.event.client_payload.hero }}"
          echo "winrate: ${{ github.event.client_payload.winrate }}"
          echo "deaths: ${{ github.event.client_payload.deaths }}"
          echo "kda: ${{ github.event.client_payload.kda }}"
          echo "bonusStat: ${{ github.event.client_payload.bonusStat }}"
          echo "bonusLabel: ${{ github.event.client_payload.bonusLabel }}"
          echo "specialty: ${{ github.event.client_payload.specialty }}"
          echo "story: ${{ github.event.client_payload.story }}"
          echo "timestamp: ${{ github.event.client_payload.timestamp }}"

      - name: Append recruit to roster
        run: |
          mkdir -p data
          if [ ! -f data/recruits.json ]; then
            echo "[]" > data/recruits.json
          fi

          BATTLETAG="${{ github.event.client_payload.battletag }}"
          ROLE="${{ github.event.client_payload.role }}"
          HERO="${{ github.event.client_payload.hero }}"
          WINRATE="${{ github.event.client_payload.winrate }}"
          DEATHS="${{ github.event.client_payload.deaths }}"
          KDA="${{ github.event.client_payload.kda }}"
          BONUSSTAT="${{ github.event.client_payload.bonusStat }}"
          BONUSLABEL="${{ github.event.client_payload.bonusLabel }}"
          SPECIALTY="${{ github.event.client_payload.specialty }}"
          STORY="${{ github.event.client_payload.story }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp }}"

          # Build hero image path
          SAFE_HERO=$(echo "$HERO" | sed 's/[^a-zA-Z0-9]//g')
          HEROIMG="assets/heroes/render/render_${SAFE_HERO}.webp"

          # Map form fields to roster-card fields
          PAYLOAD=$(jq -n \
            --arg tag "$BATTLETAG" \
            --arg hero "$HERO" \
            --arg role "$ROLE" \
            --arg heroImg "$HEROIMG" \
            --arg winRate "$WINRATE" \
            --arg deaths "$DEATHS" \
            --arg kda "$KDA" \
            --arg bonusStat "$BONUSSTAT" \
            --arg bonusLabel "$BONUSLABEL" \
            --arg specialty "$SPECIALTY" \
            --arg timestamp "$TIMESTAMP" \
            '{tag:$tag,hero:$hero,role:$role,heroImg:$heroImg,winRate:$winRate,deaths:$deaths,kda:$kda,bonusStat:$bonusStat,bonusLabel:$bonusLabel,specialty:$specialty,timestamp:$timestamp}')

          jq ". += [$PAYLOAD]" data/recruits.json > tmp.json && mv tmp.json data/recruits.json
          echo "Recruit added: $BATTLETAG ($HERO, $WINRATE win rate)"

      - name: Commit new recruit
        run: |
          git config user.email "teamthrow-bot@users.noreply.github.com"
          git config user.name "Team Throw Bot"
          git remote set-url origin https://x-access-token:${{ secrets.RECRUIT_TOKEN }}@github.com/abduznik/teamthrow.online.git
          git add data/recruits.json
          git commit -m "🎮 New recruit: ${{ github.event.client_payload.battletag }}" || echo "Nothing to commit"
          git push
