name: Process Fanart

on:
  repository_dispatch:
    types: [new_fanart]

jobs:
  process-fanart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pillow
        run: pip install Pillow

      - name: Save image data
        run: |
          PAYLOAD='${{ toJson(github.event.client_payload) }}'
          echo "$PAYLOAD" > /tmp/fanart_payload.json
          echo "$PAYLOAD" | jq -r '.image' > image_data.txt
          echo "Image data saved ($(wc -c < image_data.txt) bytes)"

      - name: Process fanart
        run: |
          TITLE=$(cat /tmp/fanart_payload.json | jq -r '.title')
          ARTIST=$(cat /tmp/fanart_payload.json | jq -r '.artist')
          DESC=$(cat /tmp/fanart_payload.json | jq -r '.description')
          LINK=$(cat /tmp/fanart_payload.json | jq -r '.artistLink')
          python3 scripts/process-fanart.py \
            image_data.txt \
            "$TITLE" "$ARTIST" "$DESC" "$LINK"

      - name: Commit and push
        run: |
          git config user.email "teamthrow-bot@users.noreply.github.com"
          git config user.name "Team Throw Bot"
          git add fanarts.json assets/fanart/
          git commit -m "🎨 Fanart: ${{ github.event.client_payload.title }} by ${{ github.event.client_payload.artist }}" || echo "Nothing to commit"
          git push
