name: Process Fanart

on:
  repository_dispatch:
    types: [new_fanart]

jobs:
  process-fanart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RECRUIT_TOKEN }}

      - name: Install Pillow
        run: pip install Pillow

      - name: Debug payload
        run: |
          echo "=== DEBUG: RAW CLIENT PAYLOAD ==="
          echo '${{ toJson(github.event.client_payload) }}'
          echo "=== DEBUG: FIELD BY FIELD ==="
          echo "title: ${{ github.event.client_payload.title }}"
          echo "artist: ${{ github.event.client_payload.artist }}"
          echo "artistLink: ${{ github.event.client_payload.artistLink }}"
          echo "description: ${{ github.event.client_payload.description }}"
          echo "imgur_url: ${{ github.event.client_payload.imgur_url }}"

      - name: Process fanart
        run: |
          python3 scripts/process-fanart.py \
            "${{ github.event.client_payload.imgur_url }}" \
            "${{ github.event.client_payload.title }}" \
            "${{ github.event.client_payload.artist }}" \
            "${{ github.event.client_payload.description }}" \
            "${{ github.event.client_payload.artistLink }}"

      - name: Commit and push
        run: |
          git config user.email "teamthrow-bot@users.noreply.github.com"
          git config user.name "Team Throw Bot"
          git remote set-url origin https://x-access-token:${{ secrets.RECRUIT_TOKEN }}@github.com/abduznik/teamthrow.online.git
          git add fanarts.json assets/fanart/
          git commit -m "🎨 Fanart: ${{ github.event.client_payload.title }} by ${{ github.event.client_payload.artist }}" || echo "Nothing to commit"
          git push
